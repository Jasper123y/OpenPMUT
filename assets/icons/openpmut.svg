<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a8a"/>
      <stop offset="50%" style="stop-color:#2563eb"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#93c5fd"/>
      <stop offset="100%" style="stop-color:#ffffff"/>
    </linearGradient>
  </defs>
  <!-- Background rounded square -->
  <rect x="16" y="16" width="480" height="480" rx="80" ry="80" fill="url(#bg)"/>
  <!-- Ultrasonic wave arcs (3 concentric) -->
  <path d="M256 340 Q256 280 310 240" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M256 340 Q256 250 340 200" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M256 340 Q256 220 370 170" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- Mirror waves left -->
  <path d="M256 340 Q256 280 202 240" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.5"/>
  <path d="M256 340 Q256 250 172 200" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.65"/>
  <path d="M256 340 Q256 220 142 170" stroke="url(#wave)" stroke-width="12" fill="none" stroke-linecap="round" opacity="0.8"/>
  <!-- PMUT chip base (rectangle) -->
  <rect x="176" y="340" width="160" height="40" rx="6" ry="6" fill="#e0e7ff" opacity="0.9"/>
  <!-- Piezo layer (thin strip) -->
  <rect x="196" y="330" width="120" height="14" rx="4" ry="4" fill="#fbbf24" opacity="0.9"/>
  <!-- Center dot (transducer element) -->
  <circle cx="256" cy="337" r="8" fill="#ffffff"/>
  <!-- Text: OpenPMUT -->
  <text x="256" y="430" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="#ffffff" letter-spacing="-1">
    OpenPMUT
  </text>
  <!-- Subtitle -->
  <text x="256" y="460" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#93c5fd" letter-spacing="2">
    SIMULATION
  </text>
</svg>
